name: Keep Supabase Alive

on:
  schedule:
    # 每 6 小時執行一次
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -L \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://ufanwuihknmjlfnmdvzo.supabase.co/rest/v1/schools?select=id&limit=1"
