<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>會考落點分析邀請碼</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Fredoka+One&family=Poppins:wght@700&display=swap');

    :root {
      /* Neo-Brutalism 色彩定義 */
      --bg-color: #f4f5f8;
      --border-color: #1e1e2f;
      --border-width: 3px;
      
      /* 卡片與區塊底色 */
      --card-bg: #e6e9ff; /* 淺紫/淺藍底 */
      --info-bg: #dbeafe;
      --white-bg: #ffffff;
      
      /* 按鈕顏色 */
      --btn-yellow: #ffb703;
      --btn-green: #a7f3d0;
      --btn-blue: #bae6fd;
      --btn-primary: #4f46e5;
      
      /* 文字顏色 */
      --text-main: #1e1e2f;
      --text-muted: #4b5563;
      
      /* 硬陰影設定 */
      --shadow-offset: 6px;
      --box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
      --box-shadow-sm: 4px 4px 0px var(--border-color);
      --box-shadow-active: 0px 0px 0px var(--border-color);
    }

    body.dark-mode {
      /* 深色模式的反轉設定 */
      --bg-color: #12121c;
      --border-color: #e5e7eb;
      --card-bg: #1e1e2f;
      --info-bg: #2d3748;
      --white-bg: #1f2937;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      background-color: var(--bg-color);
      transition: background-color 0.3s;
      overflow-x: hidden;
    }

    /* 頂部跑馬燈 */
    .marquee {
      width: 95%;
      max-width: 750px;
      overflow: hidden;
      background: var(--white-bg);
      color: var(--text-main);
      padding: 12px 20px;
      margin-bottom: 2rem;
      border-radius: 12px;
      font-weight: 700;
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
    }
    
    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      animation: marquee 20s linear infinite;
      padding: 0 100%;
    }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

    /* 主視覺容器 */
    .container {
      background: var(--card-bg);
      border: var(--border-width) solid var(--border-color);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: var(--box-shadow);
      max-width: 750px;
      width: 100%;
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
    }

    /* 標題設計 (仿照圖片左上角的 Icon 帶標題) */
    .header-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 2rem;
    }
    .header-icon {
      background: var(--btn-primary);
      color: white;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border: var(--border-width) solid var(--border-color);
      font-size: 1.5rem;
      box-shadow: var(--box-shadow-sm);
    }
    h1 {
      font-size: 2rem;
      font-weight: 900;
      margin: 0;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    /* 邀請碼展示卡片 */
    .code-card { margin: 2rem 0; }

    .invitation-code-container {
      display: flex;
      align-items: stretch;
      border-radius: 16px;
      background: var(--white-bg);
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
      overflow: hidden;
    }

    .invitation-code {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-main);
      padding: 1rem 1.5rem;
      letter-spacing: 4px;
      font-family: 'Poppins', monospace;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .digit-container { display: inline-block; width: 1.2ch; }
    .digit { display: inline-block; }
    @keyframes digitPop {
      0% { transform: scale(0.5) translateY(10px); opacity: 0; }
      60% { transform: scale(1.2) translateY(-5px); color: var(--btn-primary); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .digit-animation { animation: digitPop 0.4s ease forwards; }

    /* 複製按鈕 */
    .copy-button {
      background: var(--btn-yellow);
      color: var(--text-main);
      border: none;
      border-left: var(--border-width) solid var(--border-color);
      padding: 0 2rem;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .copy-button:hover { background: #ffc124; }
    .copy-button:active { background: #e09e00; }

    /* 時間與進度條 */
    .time-wrapper { margin-top: 2rem; }

    .timer {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
      background: var(--white-bg);
      padding: 0.6rem 1.5rem;
      border-radius: 50px;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      border: var(--border-width) solid var(--border-color);
      box-shadow: 3px 3px 0px var(--border-color);
    }
    
    .progress-container {
      width: 100%;
      background: var(--white-bg);
      border-radius: 50px;
      border: var(--border-width) solid var(--border-color);
      margin: 1.5rem 0 0.5rem;
      height: 14px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--btn-primary);
      border-right: var(--border-width) solid var(--border-color);
      transition: width 1s linear;
    }

    .last-update { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }

    /* 動作按鈕列 */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 2.5rem 0;
    }

    .button {
      color: var(--text-main);
      border: var(--border-width) solid var(--border-color);
      padding: 0.8rem 1.5rem;
      font-size: 1.1rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      box-shadow: var(--box-shadow-sm);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .btn-qr { background: var(--white-bg); }
    .btn-share { background: var(--btn-green); }
    .btn-refresh { background: var(--btn-blue); }

    .button:active {
      transform: translate(4px, 4px);
      box-shadow: var(--box-shadow-active);
    }

    /* 資訊區塊 (帶有浮水印效果) */
    .info-section {
      background: var(--white-bg);
      border-radius: 16px;
      padding: 1.8rem;
      text-align: left;
      border: var(--border-width) solid var(--border-color);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    /* 仿照圖片右側的超大浮水印圖示 */
    .info-section::after {
      content: '\f05a'; /* FontAwesome info icon */
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 8rem;
      color: var(--info-bg);
      z-index: -1;
      opacity: 0.6;
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .info-header-icon {
      background: var(--btn-primary);
      color: white;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 2px solid var(--border-color);
    }
    .info-section h3 {
      color: var(--text-main);
      margin: 0;
      font-size: 1.2rem;
      font-weight: 900;
    }
    .info-section p {
      margin-bottom: 0.8rem;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.6;
    }
    .info-section a {
      color: var(--btn-primary);
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
      font-weight: 900;
    }

    /* 浮動按鈕群 */
    .floating-buttons {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 100;
    }

    .floating-button {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      background: var(--btn-yellow);
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
      cursor: pointer;
      font-size: 1.3rem;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .floating-button:nth-child(2) { background: var(--btn-blue); }

    .floating-button:active {
      transform: translate(4px, 4px);
      box-shadow: var(--box-shadow-active);
    }

    /* 頂部返回按鈕 */
    .return-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: var(--white-bg);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 900;
      text-decoration: none;
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 90;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .return-button:active {
      transform: translate(4px, 4px);
      box-shadow: var(--box-shadow-active);
    }

    /* Modal 視窗 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: var(--card-bg);
      margin: 8% auto;
      padding: 2.5rem;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      border: var(--border-width) solid var(--border-color);
      box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
      position: relative;
      text-align: center;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .close {
      position: absolute;
      right: 15px;
      top: 15px;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--white-bg);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: var(--border-width) solid var(--border-color);
      box-shadow: 3px 3px 0px var(--border-color);
      font-size: 16px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .close:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px var(--border-color);
    }

    /* QR Code */
    #qrCode {
      background-color: #ffffff;
      padding: 15px;
      border-radius: 12px;
      margin: 20px auto;
      display: inline-block;
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
    }

    .qr-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      padding: 12px 25px;
      background: var(--btn-green);
      color: var(--text-main);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 900;
      border: var(--border-width) solid var(--border-color);
      box-shadow: var(--box-shadow-sm);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .qr-download-btn:active {
      transform: translate(4px, 4px);
      box-shadow: var(--box-shadow-active);
    }

    /* 幫助視窗清單 */
    .help-item {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      background: var(--white-bg);
      border: var(--border-width) solid var(--border-color);
      box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
      color: var(--text-main);
    }
    .help-icon {
      width: 40px;
      height: 40px;
      background: var(--btn-yellow);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .help-text { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; }

    /* 吐司提示 Toast */
    .toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-main);
      color: var(--bg-color);
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-weight: 900;
      border: 2px solid var(--bg-color);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 2000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .toast.show {
      top: 40px;
      opacity: 1;
    }

    /* 載入動畫 */
    .spinner {
      border: 4px solid rgba(0,0,0,0.1);
      border-top: 4px solid var(--btn-primary);
      border-radius: 50%;
      width: 35px;
      height: 35px;
      margin: auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 頁尾 */
    .footer {
      margin-top: auto;
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.9rem;
    }
    .footer-links a { color: var(--btn-primary); margin: 0 10px; text-decoration: none; border-bottom: 2px solid transparent;}
    .footer-links a:hover { border-bottom-color: var(--btn-primary); }
    .footer-copyright { margin-top: 10px; }

    /* 響應式 */
    @media (max-width: 640px) {
      .container { padding: 2rem 1.5rem; border-radius: 16px; }
      h1 { font-size: 1.6rem; }
      .invitation-code-container { flex-direction: column; }
      .invitation-code { padding: 1.5rem 1rem; font-size: 2.2rem; border-bottom: var(--border-width) solid var(--border-color); }
      .copy-button { padding: 1.2rem; justify-content: center; width: 100%; border-left: none; }
      .return-button { top: 15px; left: 15px; padding: 8px 12px; font-size: 0.9rem; }
      .floating-buttons { bottom: 20px; right: 20px; }
      .action-buttons { gap: 1rem; }
      .button { padding: 0.8rem 1rem; font-size: 1rem; flex: 1 1 calc(50% - 1rem); justify-content: center;}
    }
  </style>
</head>
<body>

  <a href="https://tyctw.github.io/spare/" class="return-button" id="returnBtn">
    <i class="fas fa-arrow-left"></i> 返回系統
  </a>

  <div class="marquee">
    <div class="marquee-content">
      <i class="fas fa-bullhorn" style="color:var(--btn-primary); margin-right:5px;"></i> 歡迎使用會考落點分析系統！系統每日自動更新，請把握時間查詢。如有任何問題請使用異常回報功能。
    </div>
  </div>

  <div class="container">
    <div class="header-title">
      <div class="header-icon"><i class="fas fa-school"></i></div>
      <h1>落點分析邀請碼</h1>
    </div>
    
    <div class="code-card">
      <div class="invitation-code-container">
        <div class="invitation-code" id="invitationCode">
          <div class="spinner"></div>
        </div>
        <button class="copy-button" onclick="copyInvitationCode()">
          <i class="fas fa-key"></i> 複製代碼
        </button>
      </div>
      
      <div class="time-wrapper">
        <div class="timer" id="timer"><i class="fas fa-hourglass-half"></i> 倒數：載入中...</div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="lastUpdate" class="last-update">等待更新中...</div>
      </div>
    </div>
    
    <div class="action-buttons">
      <button class="button btn-qr" onclick="showQRCode()"><i class="fas fa-qrcode"></i> 顯示 QR</button>
      <button class="button btn-share" onclick="shareInvitationCode()"><i class="fas fa-share-alt"></i> 分享連結</button>
      <button class="button btn-refresh" onclick="manualRefresh()"><i class="fas fa-sync-alt"></i> 重新載入</button>
    </div>
    
    <div class="info-section">
      <div class="info-header">
        <div class="info-header-icon"><i class="fas fa-info"></i></div>
        <h3>系統公告與須知</h3>
      </div>
      <p>邀請碼每小時自動更新，請確保網路連線狀態。</p>
      <p>請在上方進度條倒數結束前完成落點分析。</p>
      <p><i class="fas fa-link" style="color:var(--btn-primary); margin-right:5px;"></i> <a href="https://ctttw.github.io/spare/" id="infoPlatformBtn">前往分析平台</a> | <a href="https://tyctw.github.io/analysis/">查看統計資料</a></p>
    </div>
  </div>
  
  <div class="floating-buttons">
    <button id="darkModeToggle" class="floating-button" title="切換深色模式">
      <i class="fas fa-moon"></i>
    </button>
    <button id="helpButton" class="floating-button" title="使用說明">
      <i class="fas fa-question"></i>
    </button>
  </div>

  <div class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="https://tyctw.github.io/spare/" id="footerPlatformBtn">分析平台</a> •
        <a href="https://tyctw.github.io/analysis/">統計資料</a> •
        <a href="#">聯絡我們</a>
      </div>
      <div class="footer-copyright">
        &copy; 2025 會考落點分析系統
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已成功複製！</div>

  <div id="qrModal" class="modal">
    <div class="modal-content">
      <button class="close"><i class="fas fa-times"></i></button>
      <h2 style="color: var(--text-main); margin-top:0; font-weight:900;"><i class="fas fa-qrcode"></i> 專屬 QR 碼</h2>
      <div id="qrCode"></div>
      <div id="qrDownloadContainer" style="margin-top: 15px; min-height: 40px;"></div>
    </div>
  </div>

  <div id="helpModal" class="modal">
    <div class="modal-content">
      <button class="close help-close"><i class="fas fa-times"></i></button>
      <h2 style="color: var(--text-main); margin-top:0; font-weight:900;">使用說明</h2>
      <div class="help-content">
        <div class="help-item">
          <div class="help-icon"><i class="fas fa-clock"></i></div>
          <div class="help-text">邀請碼每小時自動更新，進度條顯示下次更新時間。</div>
        </div>
        <div class="help-item">
          <div class="help-icon" style="background:var(--btn-blue);"><i class="fas fa-copy"></i></div>
          <div class="help-text">點擊「複製」可將代碼複製，或分享帶參數的連結。</div>
        </div>
        <div class="help-item">
          <div class="help-icon" style="background:var(--btn-green);"><i class="fas fa-download"></i></div>
          <div class="help-text">顯示 QR Code 後，點擊下載按鈕可儲存圖片供掃描。</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // ========== 核心邏輯區 ==========
    function updateInvitationCode() {
      const codeEl = document.getElementById('invitationCode');
      codeEl.innerHTML = '<div class="spinner"></div>';
      const backendURL = 'https://script.google.com/macros/s/AKfycbwBUN15_ovfAOyhhgAF1adShWiDc2b4ouibcjZP2y-RY-1qI_IxRndV7o3lZ_WYLhnn/exec';
      
      fetch(backendURL)
        .then(response => response.json())
        .then(data => {
          const code = data.invitationCode;
          displayAnimatedCode(code);
          document.getElementById('lastUpdate').textContent = "最後更新：" + new Date().toLocaleString();
          injectInviteCodeToLinks(code);
        })
        .catch(error => {
          console.error('Error:', error);
          codeEl.textContent = "載入失敗";
        });
    }

    function injectInviteCodeToLinks(code) {
      const baseUrl = "https://tyctw.github.io/spare/";
      const urlWithCode = `${baseUrl}?invite=${code}`;

      const returnBtn = document.getElementById('returnBtn');
      if (returnBtn) returnBtn.href = urlWithCode;

      const infoPlatformBtn = document.getElementById('infoPlatformBtn');
      if (infoPlatformBtn) infoPlatformBtn.href = urlWithCode;

      const footerPlatformBtn = document.getElementById('footerPlatformBtn');
      if (footerPlatformBtn) footerPlatformBtn.href = urlWithCode;
    }

    function displayAnimatedCode(code) {
      const codeEl = document.getElementById('invitationCode');
      codeEl.innerHTML = '';
      for (let i = 0; i < code.length; i++) {
        const digitContainer = document.createElement('div');
        digitContainer.className = 'digit-container';
        digitContainer.innerHTML = `<span class="digit">${code[i]}</span>`;
        codeEl.appendChild(digitContainer);
        setTimeout(() => {
          const span = digitContainer.querySelector('.digit');
          span.classList.add('digit-animation');
        }, i * 80); 
      }
    }

    function updateTimer() {
      const now = new Date();
      const nextHour = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours() + 1, 0, 0);
      const timeLeft = nextHour - now;
      const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

      document.getElementById('timer').innerHTML = `<i class="fas fa-hourglass-half"></i> 倒數：${minutes}分 ${seconds}秒`;
      
      const hourDuration = 3600000;
      let progress = ((hourDuration - timeLeft) / hourDuration) * 100;
      document.getElementById('progressBar').style.width = Math.min(100, Math.max(0, progress)) + '%';

      if (timeLeft <= 1000 && timeLeft > 0) { setTimeout(updateInvitationCode, 2000); }
    }

    // ========== 互動與功能區 ==========
    function copyInvitationCode() {
        let code = "";
        document.querySelectorAll('.digit').forEach(el => code += el.textContent);
        if(!code) code = document.getElementById('invitationCode').textContent;
        
        navigator.clipboard.writeText(code).then(() => showToast("已成功複製代碼！"))
          .catch(() => {
            const ta = document.createElement("textarea");
            ta.value = code;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast("已成功複製代碼！");
          });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function showQRCode() {
      const modal = document.getElementById("qrModal");
      const qrDiv = document.getElementById("qrCode");
      const downloadContainer = document.getElementById("qrDownloadContainer");
      
      let code = "";
      document.querySelectorAll('.digit').forEach(el => code += el.textContent);
      if(!code) code = document.getElementById('invitationCode').textContent;
      
      qrDiv.innerHTML = '';
      downloadContainer.innerHTML = '';
      
      new QRCode(qrDiv, {
        text: code,
        width: 180,
        height: 180,
        colorDark: document.body.classList.contains('dark-mode') ? "#f9fafb" : "#1e1e2f",
        colorLight: document.body.classList.contains('dark-mode') ? "#1e1e2f" : "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
      
      const downloadBtn = document.createElement('button');
      downloadBtn.className = 'qr-download-btn';
      downloadBtn.innerHTML = '<i class="fas fa-download"></i> 下載圖片';
      
      downloadBtn.onclick = function() {
        const img = qrDiv.querySelector('img');
        const canvas = qrDiv.querySelector('canvas');
        let url = '';
        
        if(img && img.src) url = img.src;
        else if(canvas) url = canvas.toDataURL("image/png");
        
        if(url) {
          const link = document.createElement('a');
          link.download = `會考落點邀請碼_${code}.png`;
          link.href = url;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast("下載已開始！");
        } else {
          showToast("QR 碼生成中，請稍後");
        }
      };
      
      downloadContainer.appendChild(downloadBtn);
      modal.style.display = "block";
      
      const closeBtn = document.querySelector("#qrModal .close");
      closeBtn.onclick = () => modal.style.display = "none";
      window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; };
    }

    function shareInvitationCode() {
      let code = "";
      document.querySelectorAll('.digit').forEach(el => code += el.textContent);
      if(!code) code = document.getElementById('invitationCode').textContent;
      
      const shareUrl = `https://tyctw.github.io/spare/?invite=${code}`;
      
      if (navigator.share) {
        navigator.share({
          title: '會考落點分析系統',
          text: `這是我專屬的分析邀請碼：${code}\n點擊連結可自動帶入代碼，趕快來測測看！`,
          url: shareUrl
        }).catch(err => console.log('分享取消'));
      } else {
        copyInvitationCode();
        setTimeout(() => alert('瀏覽器不支援分享，已為您複製邀請碼！'), 300);
      }
    }

    function manualRefresh() { 
      updateInvitationCode(); 
      showToast("🔄 重新載入中..."); 
    }

    // ========== 視覺與初始化區 ==========
    function initDarkMode() {
      const toggle = document.getElementById('darkModeToggle');
      const isDark = localStorage.getItem('darkMode') === 'true';
      if(isDark) document.body.classList.add('dark-mode');
      updateIcon();
      
      toggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        updateIcon();
      });
    }
    
    function updateIcon() {
      const isDark = document.body.classList.contains('dark-mode');
      document.getElementById('darkModeToggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    function initHelp() {
      const modal = document.getElementById('helpModal');
      document.getElementById('helpButton').onclick = () => modal.style.display = "block";
      document.querySelector('.help-close').onclick = () => modal.style.display = "none";
    }

    // 啟動
    updateInvitationCode();
    setInterval(updateTimer, 1000);
    initDarkMode();
    initHelp();
    
    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
